<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TimeGauge</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="header">
        <h1>⏳ TimeGauge</h1>
        <p>Watch your remaining time disappear.</p>
    </header>

    <main class="container">

        <section class="summary">
            <div class="summary-card">
                <span>Total Registered</span>
                <strong id="total-time">0h 0m</strong>
            </div>

            <div class="summary-card">
                <span>Activities</span>
                <strong id="activity-count">0</strong>
            </div>

            <div class="summary-card">
                <span>Running</span>
                <strong id="running-count">0</strong>
            </div>

            <!-- ★追加 -->
            <div class="summary-card">
                <span>Total Over Time</span>
                <strong id="total-overtime">00:00</strong>
            </div>
        </section>

        <section class="add-panel">

            <input
                id="activity-name"
                type="text"
                placeholder="Activity name"
            >

            <input
                id="activity-hours"
                type="number"
                min="0"
                value="0"
            >

            <input
                id="activity-minutes"
                type="number"
                min="1"
                value="30"
            >

            <button id="add-btn">
                Add
            </button>

        </section>

        <section id="activity-list"></section>

        <section id="empty-state" class="empty">
            <h2>No activities yet</h2>
            <p>Add your first timer above.</p>
        </section>

    </main>

    <div id="toast" class="toast"></div>

    <script type="module" src="js/app.js"></script>

</body>
</html>
